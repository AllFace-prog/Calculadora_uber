name: Build APK com Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependências do sistema e do Buildozer
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
        sudo apt-get install -y libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav libgstreamer-plugins-base1.0-dev
        sudo apt-get install -y p7zip-full ccache autoconf libtool pkg-config libncurses5-dev libncursesw5-dev libtinfo5 cmake zip unzip
        pip install --upgrade pip
        pip install Cython==3.0.10 buildozer

    - name: Gerar o APK com Buildozer
      run: |
        yes | buildozer -v android debug

    - name: Salvar o APK gerado
      uses: actions/upload-artifact@v4
      with:
        name: Seu-Aplicativo-APK
        path: bin/*.apk
        

name: Build APK com Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependências do sistema e do Buildozer
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git pkg-config libffi-dev libssl-dev libncurses5-dev libncursesw5-dev zlib1g-dev zip unzip
        pip install --upgrade pip
        pip install Cython==3.0.10 buildozer

    - name: Gerar o APK com Buildozer
      run: |
        yes | buildozer -v android debug

    - name: Salvar o APK gerado
      uses: actions/upload-artifact@v4
      with:
        name: Seu-Aplicativo-APK
        path: bin/*.apk
        
